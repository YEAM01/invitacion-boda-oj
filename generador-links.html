<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de links personalizados</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
<style>
  body{
    font-family:'Poppins',sans-serif;
    background:#e9e2d3;
    display:flex;
    justify-content:center;
    padding:30px 16px;
    color:#4a3f35;
  }
  .card{
    max-width:420px;
    width:100%;
    background:#faf6ef;
    border-radius:14px;
    padding:28px 24px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
  }
  h1{
    font-family:'Playfair Display',serif;
    font-size:22px;
    margin-bottom:6px;
    text-align:center;
  }
  p.sub{
    text-align:center;
    font-size:13px;
    color:#8a7b6c;
    margin-bottom:22px;
  }
  label{
    display:block;
    font-size:12px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:#8a7b6c;
    margin-bottom:6px;
  }
  input{
    width:100%;
    padding:10px 12px;
    border:1px solid #d9c7a3;
    border-radius:8px;
    margin-bottom:16px;
    font-size:14px;
    font-family:'Poppins',sans-serif;
  }
  button{
    width:100%;
    background:#b08d57;
    color:#fff;
    border:none;
    padding:12px;
    border-radius:30px;
    font-size:13px;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
  }
  #resultado{
    margin-top:20px;
    padding:14px;
    background:#f2ead9;
    border-radius:8px;
    font-size:12px;
    word-break:break-all;
    display:none;
  }
  #resultado a{color:#b08d57;}
  .acciones{
    display:flex;
    gap:10px;
    margin-top:10px;
  }
  .acciones button{
    background:#4a3f35;
    font-size:11px;
    padding:8px;
  }
  table{
    width:100%;
    margin-top:26px;
    border-collapse:collapse;
    font-size:12px;
  }
  th,td{
    text-align:left;
    padding:6px 4px;
    border-bottom:1px solid #e9e2d3;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Generador de invitaciones</h1>
  <p class="sub">Crea un link personalizado por familia, igual que en el video (nombre + cupos reservados).</p>

  <label>Nombre de la familia / invitado</label>
  <input id="familia" placeholder="Fam. Palmeño Hernández">

  <label>Cupos reservados</label>
  <input id="cupos" type="number" min="1" value="2">

  <label>URL base del sitio</label>
  <input id="base" placeholder="https://tu-sitio.com/index.html">

  <button onclick="generar()">Generar link</button>

  <div id="resultado">
    <div id="link-texto"></div>
    <div class="acciones">
      <button onclick="copiar()">Copiar link</button>
      <button onclick="abrirWA()">Enviar por WhatsApp</button>
    </div>
  </div>

  <table id="historial-tabla">
    <thead><tr><th>Familia</th><th>Cupos</th><th>Link</th></tr></thead>
    <tbody id="historial-body"></tbody>
  </table>
</div>

<script>
  // Autocompleta la URL base con la ubicación actual del archivo
  document.getElementById('base').value = window.location.href.replace('generador-links.html','index.html');

  let ultimoLink = '';
  const historial = [];

  function generar(){
    const familia = document.getElementById('familia').value.trim();
    const cupos = document.getElementById('cupos').value.trim();
    const base = document.getElementById('base').value.trim();
    if(!familia || !base) { alert('Escribe el nombre de la familia y la URL base.'); return; }

    const url = new URL(base);
    url.searchParams.set('familia', familia);
    url.searchParams.set('cupos', cupos);
    ultimoLink = url.toString();

    document.getElementById('resultado').style.display = 'block';
    document.getElementById('link-texto').innerHTML = `<a href="${ultimoLink}" target="_blank">${ultimoLink}</a>`;

    historial.push({familia, cupos, link: ultimoLink});
    renderHistorial();
  }

  function renderHistorial(){
    const body = document.getElementById('historial-body');
    body.innerHTML = '';
    historial.forEach(item=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${item.familia}</td><td>${item.cupos}</td><td><a href="${item.link}" target="_blank">abrir</a></td>`;
      body.appendChild(tr);
    });
  }

  function copiar(){
    navigator.clipboard.writeText(ultimoLink);
    alert('Link copiado');
  }

  function abrirWA(){
    const familia = document.getElementById('familia').value.trim();
    const msg = encodeURIComponent(`¡Hola ${familia}! Con mucho cariño les compartimos nuestra invitación de boda: ${ultimoLink}`);
    window.open(`https://wa.me/?text=${msg}`, '_blank');
  }
</script>
</body>
</html>
